<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- API Key Setup Screen -->
  <div class="setup-screen" id="setupScreen">
    <div class="setup-box">
      <h2>Welcome to AI Assistant</h2>
      <p>Enter your Groq API key to get started. It will be saved in your browser.</p>
      <input type="text" id="apiKeyInput" placeholder="Paste your Groq API key here..." />
      <button onclick="saveApiKey()">Start Chatting</button>
    </div>
  </div>

  <!-- Chat Screen -->
  <div class="chat-container" id="chatContainer" style="display:none;">
    <div class="chat-header">
      <span class="status-dot"></span>
      <h1>AI Assistant</h1>
      <button class="reset-key-btn" onclick="resetApiKey()" title="Change API Key">&#9881;</button>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="message bot">
        <div class="bubble">Hi! I'm your AI assistant. Ask me anything!</div>
      </div>
    </div>

    <div class="chat-input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Type your message..."
        autocomplete="off"
      />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="chat-container">

    <div class="chat-header">
      <div class="header-avatar">
        <!-- Robot/chatbot icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="8" width="18" height="13" rx="2"/>
          <path d="M12 8V5"/>
          <circle cx="12" cy="4" r="1"/>
          <circle cx="8.5" cy="14" r="1.5" fill="white" stroke="none"/>
          <circle cx="15.5" cy="14" r="1.5" fill="white" stroke="none"/>
          <path d="M9 18h6"/>
        </svg>
      </div>
      <div class="header-info">
        <h1>AI Assistant</h1>
        <span class="header-subtitle">
          <span class="status-dot"></span>
          Online · Powered by AI
        </span>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="message bot">
        <div class="avatar bot-avatar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="8" width="18" height="13" rx="2"/>
            <path d="M12 8V5"/>
            <circle cx="12" cy="4" r="1"/>
            <circle cx="8.5" cy="14" r="1.2" fill="white" stroke="none"/>
            <circle cx="15.5" cy="14" r="1.2" fill="white" stroke="none"/>
            <path d="M9 18h6"/>
          </svg>
        </div>
        <div class="bubble">Hi! I'm your AI assistant. Ask me anything!</div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <input
          type="text"
          id="userInput"
          placeholder="Message AI Assistant..."
          autocomplete="off"
        />
        <button id="sendBtn" onclick="sendMessage()" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
